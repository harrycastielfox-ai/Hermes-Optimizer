name: Release Windows Signed

on:
  workflow_dispatch:
    inputs:
      bundles:
        description: "Windows bundles to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - nsis
          - msi
      timestamp_url:
        description: "Authenticode timestamp URL"
        required: true
        default: "http://timestamp.digicert.com"
      tsp:
        description: "Use RFC 3161 / TSP timestamp mode"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  signed-windows:
    name: Build signed Windows installers
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      HERMES_SIGNING_PFX_BASE64: ${{ secrets.HERMES_SIGNING_PFX_BASE64 }}
      HERMES_SIGNING_PFX_PASSWORD: ${{ secrets.HERMES_SIGNING_PFX_PASSWORD }}
      HERMES_TIMESTAMP_URL: ${{ github.event.inputs.timestamp_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Release gates
        run: npm run verify:release-gates

      - name: Import Code Signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:HERMES_SIGNING_PFX_BASE64)) {
            throw "Secret HERMES_SIGNING_PFX_BASE64 nao configurado."
          }
          if ([string]::IsNullOrWhiteSpace($env:HERMES_SIGNING_PFX_PASSWORD)) {
            throw "Secret HERMES_SIGNING_PFX_PASSWORD nao configurado."
          }

          npm run release:signing:import-pfx
          $import = Get-Content .release/signing-pfx-import.json -Raw | ConvertFrom-Json
          if (-not $import.imported -or [string]::IsNullOrWhiteSpace([string]$import.thumbprint)) {
            throw "Importacao de PFX nao gerou thumbprint valido."
          }

          "HERMES_CERT_THUMBPRINT=$($import.thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Certificado Code Signing importado: $($import.subject)"
          "Thumbprint configurado para o build assinado."

      - name: Signing preflight
        run: npm run release:signing:preflight

      - name: Build signed Windows installers
        shell: pwsh
        run: |
          $args = @("run", "build:windows:real:signed", "--", "-Bundles", "${{ github.event.inputs.bundles }}")
          if ("${{ github.event.inputs.tsp }}" -eq "true") {
            $args += "-Tsp"
          }
          & npm.cmd @args

      - name: Public release gate
        run: npm run release:public:verify

      - name: Upload signed installers and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-windows-signed-release
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            .release/signing-preflight.json
            .release/signing-preflight.md
            .release/signing-pfx-import.json
            .release/hermes-signing-env.ps1
            .release/release-public-verification.json
            .release/release-public-verification.md
            .release/release-status.json
            .release/release-status.md
